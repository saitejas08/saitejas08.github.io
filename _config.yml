# _config.yml
title: "Sai Teja Portfolio"
email: saitejaalanthrawar@gmail.com
description: "Full stack developer portfolio & blog"
baseurl: "" # no subpath
url: "https://saitejas08.github.io"

theme: minima # you can keep minima or swap out
plugins:
  - jekyll-feed

# Collections aren’t needed—Jekyll treats `about.md`, etc. as pages automatically.

# Pretty URLs
permalink: pretty

# Ensure assets are copied
include:
  - assets

# Defaults: pages use default layout
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
